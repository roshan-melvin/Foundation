name: CI Validation

on:
  pull_request:
    branches: [ main, master, develop ]

jobs:
  validate-code:
    runs-on: ubuntu-latest

    steps:
      - name: 📁 Checkout Code (Full History for Secret Scanning)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 💡 CRITICAL: Gitleaks needs full git history to scan PR commit diffs accurately

      # --- STAGE 1: SECRET SCANNING GATE ---
      - name: 🛡️ Scan for Leaked Secrets
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Note: If a developer pushes a hardcoded token format, this step kills the PR build instantly.

      # --- STAGE 2: NODE ECOSYSTEM SETUP ---
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔍 Run Linter
        run: npm run lint --if-present

      - name: 🧪 Run Tests
        run: npm test --if-present
