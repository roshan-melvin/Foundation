name: "CodeQL Advanced Security Scan"

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  schedule:
    - cron: '30 4 * * 1' # Runs automatically every Monday at 4:30 AM UTC

jobs:
  analyze:
    name: Analyze Code
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write # Required to post results back to the Security tab

    strategy:
      fail-fast: false
      matrix:
        # Supported languages: 'c-cpp', 'csharp', 'go', 'java-kotlin', 'javascript-typescript', 'python', 'ruby', 'swift'
        language: [ 'javascript-typescript' ] 

    steps:
      - name: 📁 Checkout Repository
        uses: actions/checkout@v7

      - name: ⚙️ Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # queries: security-extended,security-and-quality # Optional: Un-comment for extra deep checks

      # For compiled languages (Java, C#, Go), you'd run your build command here.
      # Since JS/TS/Python don't need compilation, autobuild works fine out of the box.
      - name: 🛠️ Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: 🔍 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"