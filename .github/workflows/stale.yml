name: Stale Issue Automation

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - name: Mark stale issues and PRs
        uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: >-
            This issue has been marked stale because it has had no recent activity.
            Please comment if it is still relevant.
          stale-pr-message: >-
            This pull request has been marked stale because it has had no recent activity.
            Please comment if it is still relevant.
          close-issue-message: >-
            This issue was closed because it remained inactive after being marked stale.
          close-pr-message: >-
            This pull request was closed because it remained inactive after being marked stale.
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security,good first issue
          exempt-pr-labels: pinned,security,work in progress
          operations-per-run: 100
