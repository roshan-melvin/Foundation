name: Dependency Review

on:
  pull_request:
    branches: [ main, master, develop ]

permissions:
  contents: read 
  pull-requests: write # 💥 Highly recommended to see the vulnerability breakdown in PR comments

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: 📁 Checkout Code
        uses: actions/checkout@v4

      # 🔴 TEST TRIGGER: An unreviewed/vulnerable version of an action
      # This old version contains a critical script injection risk.
      - name: 🛡️ Injected Vulnerable Action
        uses: actions/stale@v3.0.0

      - name: 🛡️ Run Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # This catches the critical flaw introduced by actions/stale@v3.0.0
          fail-on-severity: high 
